<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- viewport-fit=cover is CRITICAL: exposes safe-area-inset CSS vars on iOS notch devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Apple PWA meta tags: removes Safari chrome when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="I M Smrti" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <title>I M Smrti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Nuclear cache buster — increment CACHE_VERSION on each deploy to force fresh code
      (async function() {
        var V = 'v12';
        if (localStorage.getItem('_cv') !== V) {
          try {
            var regs = await (navigator.serviceWorker ? navigator.serviceWorker.getRegistrations() : Promise.resolve([]));
            for (var i = 0; i < regs.length; i++) { await regs[i].unregister(); }
            var keys = await (window.caches ? caches.keys() : Promise.resolve([]));
            for (var j = 0; j < keys.length; j++) { await caches.delete(keys[j]); }
            localStorage.setItem('_cv', V);
            // Only reload if we actually found something to clear, otherwise it's just a normal first load
            if (regs.length > 0 || keys.length > 0) {
              window.location.reload();
            }
          } catch (e) {
            console.error("Cache purge failed", e);
            localStorage.setItem('_cv', V); // Set it anyway to avoid loop
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
